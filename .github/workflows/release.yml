name: release

on:
  push:
    tags:
      - "v*"
  # Manual trigger to (re)build the macOS/Windows bundles for an existing
  # release tag without re-running GoReleaser (which owns the linux artifact
  # and the GitHub Release itself).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build platform bundles for (e.g. v0.1.1)"
        required: true

permissions:
  contents: write

jobs:
  # Linux is built and released by GoReleaser, which also creates the GitHub
  # Release that the macOS/Windows jobs attach their bundles to. Only on a real
  # tag push -- on a manual dispatch the release already exists.
  linux:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Fyne build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # macOS is a CGo/Fyne app, so it must be built on a real macOS runner. Build a
  # universal (arm64 + amd64) .app on the Apple Silicon runner -- its Xcode SDK
  # is universal, so it can also emit the amd64 slice, and `lipo` merges them.
  # This avoids GitHub's scarce/slow Intel runners entirely.
  macos:
    needs: linux
    if: always() && (github.event_name == 'workflow_dispatch' || needs.linux.result == 'success')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install fyne packaging tool
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build universal .app and attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          export GOWORK=off
          LD="-s -w -X=github.com/aldernero/palettedb/ui.appVersion=${VERSION}"
          # Native arm64 slice, then cross-build the amd64 slice (the runner's
          # SDK is universal), then fuse into one universal binary.
          CGO_ENABLED=1 GOARCH=arm64 go build -trimpath -ldflags "$LD" -o pdb_arm64 ./cmd/palettedb
          CGO_ENABLED=1 GOARCH=amd64 go build -trimpath -ldflags "$LD" -o pdb_amd64 ./cmd/palettedb
          # Name the fused binary `palettedb` -- fyne uses this basename for the
          # executable inside the .app bundle (Contents/MacOS/palettedb).
          lipo -create -output palettedb pdb_arm64 pdb_amd64
          lipo -info palettedb
          # Wrap the prebuilt universal binary into PaletteDB.app (fyne does not
          # rebuild on darwin when --exe is given, so the ldflags are preserved).
          fyne package --os darwin --exe palettedb \
            --icon "$PWD/ui/resources/icon.png" --name PaletteDB \
            --app-id com.aldernero.palettedb --app-version "${VERSION}"
          ZIP="palettedb_${VERSION}_darwin_universal.zip"
          ditto -c -k --keepParent PaletteDB.app "$ZIP"
          gh release upload "$TAG" "$ZIP" --clobber
          # Drop any older arch-specific Mac asset from a previous run.
          gh release delete-asset "$TAG" "palettedb_${VERSION}_darwin_arm64.zip" -y || true
          gh release delete-asset "$TAG" "palettedb_${VERSION}_darwin_amd64.zip" -y || true

  # Windows likewise needs a native runner for CGo. Produce an .exe with the
  # icon and version metadata embedded, zipped with the README and license.
  windows:
    needs: linux
    if: always() && (github.event_name == 'workflow_dispatch' || needs.linux.result == 'success')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install fyne packaging tool
        shell: bash
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Package .exe and attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          export GOWORK=off
          # fyne build reads ldflags from GOFLAGS (single space-free token), so
          # inject the version with the -X=pkg=value form.
          export GOFLAGS="-ldflags=-X=github.com/aldernero/palettedb/ui.appVersion=${VERSION}"
          fyne package --os windows --release --src ./cmd/palettedb \
            --icon "$PWD/ui/resources/icon.png" --name PaletteDB \
            --app-id com.aldernero.palettedb --app-version "${VERSION}"
          EXE="$(find . -name 'PaletteDB.exe' -type f | head -1)"
          mkdir -p pkg
          cp "$EXE" pkg/PaletteDB.exe
          cp README.md LICENSE pkg/
          ZIP="palettedb_${VERSION}_windows_amd64.zip"
          7z a "$ZIP" ./pkg/*
          gh release upload "$TAG" "$ZIP" --clobber

  # Regenerate checksums.txt over every distributed archive (GoReleaser only
  # covers the linux tarball). Runs after the platform jobs so all zips exist.
  checksums:
    needs: [linux, macos, windows]
    if: always() && needs.macos.result == 'success' && needs.windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checksum all release archives
        env:
          GH_TOKEN: ${{ github.token }}
          # This job has no checkout, so gh can't infer the repo from a git
          # remote -- name it explicitly.
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir dl && cd dl
          gh release download "$TAG" --pattern '*.tar.gz' --pattern '*.zip'
          sha256sum * > checksums.txt
          cat checksums.txt
          gh release upload "$TAG" checksums.txt --clobber
