# GoReleaser config for palettedb.
# palettedb is a Fyne GUI app: it needs CGo and native GL/X11 libraries, so the
# release targets linux/amd64 (which also runs on Wayland via XWayland). Other
# platforms should build from source (`go install .../cmd/palettedb@latest`).
version: 2

project_name: palettedb

builds:
  - id: palettedb
    main: ./cmd/palettedb
    binary: palettedb
    env:
      - CGO_ENABLED=1
      - GOWORK=off # build against go.mod versions, not the local go.work
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/aldernero/palettedb/ui.appVersion={{ .Version }}

archives:
  - id: palettedb
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      # Attribution for the embedded third-party colormap data and icons.
      - src: internal/builtins/THIRD_PARTY_NOTICES.md
        dst: notices/builtin-palettes.md
      - src: ui/resources/THIRD_PARTY_NOTICES.md
        dst: notices/icons.md
      - src: internal/builtins/LICENSE-*.txt
        dst: notices/licenses

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"

release:
  github:
    owner: aldernero
    name: palettedb
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: >-
    ## Downloads

    - **Linux** (amd64): `palettedb_{{ .Version }}_linux_amd64.tar.gz`

    - **macOS**: `palettedb_{{ .Version }}_darwin_arm64.zip` (Apple Silicon) or
    `palettedb_{{ .Version }}_darwin_amd64.zip` (Intel) — unzip and run
    `PaletteDB.app`

    - **Windows** (amd64): `palettedb_{{ .Version }}_windows_amd64.zip`

    The macOS and Windows bundles are attached to this release shortly after it
    is published. Or install from source on any platform:
    `go install github.com/aldernero/palettedb/cmd/palettedb@{{ .Tag }}`
